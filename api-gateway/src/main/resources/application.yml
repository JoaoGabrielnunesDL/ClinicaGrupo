spring:
  application:
    name: api-gateway
  security:
    user:
      name: admin
      password: 123
  cloud:
    gateway:
      routes:
        - id: administrativo
          uri: http://localhost:8081
          predicates:
            - Path=/api/admin/**

        - id: agendamento
          uri: http://localhost:8082
          predicates:
            - Path=/api/agendamento/**

        - id: atendimento
          uri: http://localhost:8083
          predicates:
            - Path=/api/atendimento/**

server:
  port: 8080