server:
  port: 8080 # Porta por onde todas as requisições vão entrar

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # 1. Microsserviço Administrativo (Geovani) - Porta 8081
        - id: administrativo-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/admin/**

        # 2. Microsserviço de Agendamento (João) - Porta 8082
        - id: agendamento-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/agendamento/**

        # 3. Microsserviço de Atendimento (Lucas S.) - Porta 8083
        - id: atendimento-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/atendimento/**