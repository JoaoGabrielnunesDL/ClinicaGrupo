server:
  port: 8083
  servlet:
    context-path: /api/atendimento

spring:
  application:
    name: atendimento
  datasource:
    url: jdbc:postgresql://localhost:5432/clinica_medica
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true