# ===================================================================
# M�dulo: administrativo
# ===================================================================

server:
  port: 8081
  servlet:
    context-path: /api/admin

spring:
  application:
    name: administrativo

  # ===================================================================
  # Banco de Dados: PostgreSQL
  # ===================================================================
  datasource:
    url: jdbc:postgresql://localhost:5432/clinica_medica
    username: postgres  # Ajuste com o seu usu�rio do Postgres local, se for diferente
    password: root      # Ajuste com a sua senha do Postgres local
    driver-class-name: org.postgresql.Driver

  # ===================================================================
  # JPA / Hibernate
  # ===================================================================
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true